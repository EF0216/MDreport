<style>
  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --line: #d8e2ec;
    --text: #1f2933;
    --muted: #62748a;
    --blue: #1f5f99;
    --blue-dark: #173f66;
    --blue-soft: #e7f1fb;
    --danger: #b42318;
    --danger-bg: #fff1f0;
    --shadow: 0 10px 30px rgba(31, 47, 70, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.6;
  }

  .app-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 40px;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 22px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 8px;
    font-size: 30px;
    color: #102a43;
  }

  h2 {
    margin-bottom: 0;
    font-size: 18px;
  }

  .lead {
    max-width: 720px;
    margin-bottom: 0;
    color: var(--muted);
  }

  .header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  button {
    min-height: 40px;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 0 16px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  button:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .primary-button {
    background: var(--blue);
    color: #ffffff;
  }

  .secondary-button {
    background: #ffffff;
    color: var(--blue-dark);
    border-color: var(--line);
  }

  .status,
  .error {
    margin-bottom: 16px;
    border-radius: 8px;
    padding: 12px 14px;
    background: var(--blue-soft);
    color: var(--blue-dark);
    font-weight: 700;
  }

  .error {
    background: var(--danger-bg);
    color: var(--danger);
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin: 18px 0;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .tab {
    flex: 0 0 auto;
    background: #ffffff;
    color: var(--muted);
    border-color: var(--line);
  }

  .tab.active {
    background: var(--blue-dark);
    color: #ffffff;
    border-color: var(--blue-dark);
  }

  .dashboard-section {
    display: none;
  }

  .dashboard-section.active {
    display: block;
  }

  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 18px 0 12px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    border-radius: 999px;
    padding: 0 12px;
    background: var(--blue-soft);
    color: var(--blue-dark);
    font-size: 13px;
    font-weight: 700;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .card-grid.compact {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .card,
  .list-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 16px;
  }

  .card.important {
    border-color: #f59e0b;
    background: #fffaf0;
  }

  .card-title {
    margin-bottom: 8px;
    font-weight: 800;
    color: #102a43;
  }

  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .importance {
    color: #92400e;
    font-weight: 800;
  }

  .action {
    margin-top: 10px;
    color: var(--blue-dark);
    font-weight: 700;
  }

  .temp-hot {
    color: #b42318;
    font-weight: 900;
  }

  .temp-cool {
    color: #1f5f99;
    font-weight: 900;
  }

  .temp-neutral {
    color: var(--text);
    font-weight: 900;
  }

  .list {
    display: grid;
    gap: 12px;
  }

  .list-item a {
    color: var(--blue);
    font-weight: 800;
    text-decoration: none;
  }

  .table-wrap {
    margin-top: 14px;
    overflow-x: auto;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  .sticky-table-wrap {
    max-height: calc(100vh - 170px);
    overflow: auto;
  }

  .weather-trend {
    margin-top: 14px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
  }

  .trend-toolbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .trend-toolbar h3 {
    margin: 0 0 2px;
    font-size: 16px;
    color: #102a43;
  }

  .trend-toolbar p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .trend-toolbar label {
    display: grid;
    gap: 4px;
    min-width: 180px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .trend-toolbar select {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--text);
    font: inherit;
    padding: 0 10px;
  }

  .chart-surface {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    border-top: 1px solid var(--line);
    padding-top: 6px;
  }

  .chart-surface svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .chart-hit {
    cursor: pointer;
    outline: none;
  }

  .chart-hit:focus {
    stroke: #102a43;
    stroke-width: 2;
  }

  .chart-tooltip {
    position: absolute;
    z-index: 5;
    max-width: 260px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    box-shadow: var(--shadow);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.5;
    padding: 8px 10px;
    pointer-events: none;
    white-space: nowrap;
  }

  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .chart-legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend-line {
    display: inline-block;
    width: 22px;
    height: 3px;
    border-radius: 999px;
  }

  .legend-line.max {
    background: var(--blue);
  }

  .legend-line.min {
    background: #64748b;
  }

  .legend-line.last-year-max {
    background: repeating-linear-gradient(
      to right,
      #8b5cf6 0,
      #8b5cf6 6px,
      transparent 6px,
      transparent 11px
    );
  }

  .legend-line.last-year-min {
    background: repeating-linear-gradient(
      to right,
      #94a3b8 0,
      #94a3b8 6px,
      transparent 6px,
      transparent 11px
    );
  }

  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: #f59e0b;
  }

  table {
    width: 100%;
    min-width: 820px;
    border-collapse: collapse;
    font-size: 14px;
  }

  th,
  td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
  }

  th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: #f0f4f8;
    color: #334e68;
    font-weight: 800;
    white-space: nowrap;
  }

  tr:last-child td {
    border-bottom: 0;
  }

  .empty {
    color: var(--muted);
    background: #ffffff;
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 18px;
  }

  .footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
    color: var(--muted);
  }

  .footer strong {
    color: var(--text);
  }

  @media (max-width: 900px) {
    .page-header {
      display: block;
    }

    .header-actions {
      justify-content: flex-start;
      margin-top: 16px;
    }

    .card-grid,
    .card-grid.compact {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .product-summary-grid,
    .product-analysis-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .app-shell {
      width: min(100% - 20px, 1180px);
      padding-top: 18px;
    }

    h1 {
      font-size: 24px;
    }

    .card-grid,
    .card-grid.compact {
      grid-template-columns: 1fr;
    }

    .product-summary-grid,
    .product-analysis-grid,
    .product-zone-split {
      grid-template-columns: 1fr;
    }

    .header-actions button {
      flex: 1 1 140px;
    }

    .footer {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .trend-toolbar {
      display: block;
    }

    .trend-toolbar label {
      margin-top: 12px;
      min-width: 0;
    }
  }

  /* ── 売上・カテゴリタブ ─────────────────────────────────── */
  .section-heading label.toolbar-label,
  .toolbar-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .toolbar-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #62748a;
  }

  .toolbar-label select {
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid #cdd9e5;
    border-radius: 6px;
    background: #fff;
    color: #1e3a5f;
  }

  .toolbar-row {
    margin-bottom: 16px;
  }

  .product-period-row,
  .section-period-row {
    align-items: flex-start;
    gap: 10px;
    margin-top: -4px;
  }

  .segmented-control {
    display: inline-flex;
    gap: 2px;
    padding: 3px;
    border: 1px solid #cdd9e5;
    border-radius: 8px;
    background: #eef4fb;
  }

  .segment,
  .week-tab {
    border: 1px solid transparent;
    background: transparent;
    color: #425b76;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
  }

  .segment {
    padding: 5px 12px;
  }

  .segment.is-active,
  .week-tab.is-active {
    background: var(--blue-dark);
    color: #ffffff;
    border-color: var(--blue-dark);
  }

  .week-tabs {
    display: none;
    flex: 1 1 520px;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .week-tabs.is-visible {
    display: flex;
  }

  .section-week-tabs {
    margin: -8px 0 14px;
  }

  .week-tab {
    flex: 0 0 auto;
    padding: 7px 10px;
    border-color: #cdd9e5;
    background: #ffffff;
  }

  .sales-block {
    margin-bottom: 32px;
  }

  .sales-block-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e3a5f;
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid #1f5f99;
  }

  .sales-table th.num,
  .sales-table td.num,
  #categoryTable th.num,
  #categoryTable td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #categoryTable {
    min-width: 900px;
  }

  #categoryTable th,
  #categoryTable td {
    white-space: nowrap;
  }

  .row-total td {
    font-weight: 700;
    background: #f0f4f8;
  }

  .num-good { color: #0a6e3f; font-weight: 600; }
  .num-warn { color: #b45309; font-weight: 600; }
  .num-bad  { color: #b91c1c; font-weight: 600; }

  .sales-alert-breakdown {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
  }

  .sales-alert-bumon {
    border: 1px solid #d8e3ee;
    border-radius: 8px;
    background: #f8fbfe;
    padding: 8px 10px;
  }

  .sales-alert-bumon-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    color: #173f66;
    font-size: 12px;
    font-weight: 700;
  }

  .sales-alert-amount,
  .sales-main-amount,
  .sales-main-empty {
    color: #62748a;
    font-size: 11px;
    font-weight: 400;
  }

  .sales-gross-line {
    margin-top: 6px;
    color: #425b76;
    font-size: 12px;
    font-weight: 700;
  }

  .sales-alert-main {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 5px;
    font-size: 12px;
  }

  .sales-main-name {
    color: #0f2740;
    font-weight: 700;
  }

  .sales-zone-subcats {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
  }

  .sales-zone-subcat-group {
    border-top: 1px solid #d8e3ee;
    padding-top: 8px;
  }

  .sales-zone-subcat-title {
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .sales-subcat-list {
    display: grid;
    gap: 4px;
    margin: 0;
    padding-left: 18px;
    font-size: 12px;
  }

  .sales-subcat-list li {
    padding-left: 2px;
  }

  .sales-subcat-name {
    display: block;
    color: #0f2740;
    font-weight: 700;
  }

  .sales-zone-yoy {
    margin-left: 4px;
    white-space: nowrap;
  }

  .sales-judgment {
    display: inline-flex;
    align-items: center;
    margin-top: 8px;
    padding: 3px 8px;
    border-radius: 999px;
    background: #eef4fb;
    font-size: 12px;
    font-weight: 800;
  }

  .product-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .product-summary-card {
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
  }

  .product-summary-label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .product-summary-value {
    margin-top: 4px;
    color: #102a43;
    font-size: 18px;
    font-weight: 900;
  }

  .product-summary-detail {
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  .product-summary-detail b {
    color: #425b76;
    font-weight: 800;
  }

  .product-summary-reason {
    display: block;
    margin-top: 4px;
    color: #173f66;
    font-weight: 800;
  }

  .product-analysis-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .product-card-title {
    margin-bottom: 8px;
    color: #102a43;
    font-size: 16px;
    font-weight: 900;
  }

  .product-card {
    padding: 12px;
  }

  .product-kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    margin-bottom: 8px;
  }

  .product-kpi-grid div {
    border: 1px solid #d8e3ee;
    border-radius: 8px;
    background: #f8fbfe;
    padding: 6px 8px;
  }

  .product-kpi-grid span {
    display: block;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
  }

  .product-kpi-grid strong {
    display: block;
    margin-top: 2px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }

  .product-zone-split {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    border-top: 1px solid #d8e3ee;
    padding-top: 8px;
  }

  .product-temp-note {
    border: 1px solid #d8e3ee;
    border-radius: 8px;
    background: #fbfdff;
    padding: 6px 8px;
    margin-bottom: 8px;
    font-size: 11px;
  }

  .product-temp-note strong {
    display: block;
    margin-bottom: 2px;
  }

  .product-temp-note span {
    color: var(--muted);
  }

  .product-zone-list {
    display: grid;
    gap: 3px;
    margin: 0;
    padding-left: 18px;
    font-size: 11px;
  }

  .product-zone-list li span:first-child {
    display: block;
    color: #0f2740;
    font-weight: 700;
  }

  .product-zone-list strong {
    font-variant-numeric: tabular-nums;
  }

  .product-zone-yoy {
    margin-left: 4px;
    white-space: nowrap;
  }

  .product-table-wrap {
    max-height: calc(100vh - 180px);
  }

  .category-table-wrap {
    overflow-x: hidden;
  }

  #categoryTable {
    min-width: 0;
    width: 100%;
    table-layout: fixed;
    font-size: 12px;
  }

  #categoryTable th,
  #categoryTable td {
    white-space: normal;
    overflow-wrap: anywhere;
    padding: 8px 6px;
    line-height: 1.35;
  }

  #categoryTable th:nth-child(1),
  #categoryTable td:nth-child(1) { width: 10%; }
  #categoryTable th:nth-child(2),
  #categoryTable td:nth-child(2) { width: 9%; }
  #categoryTable th:nth-child(3),
  #categoryTable td:nth-child(3) { width: 10%; }
  #categoryTable th:nth-child(4),
  #categoryTable td:nth-child(4) { width: 6%; }
  #categoryTable th:nth-child(5),
  #categoryTable td:nth-child(5) { width: 8%; }
  #categoryTable th:nth-child(6),
  #categoryTable td:nth-child(6) { width: 9%; }
  #categoryTable th:nth-child(7),
  #categoryTable td:nth-child(7) { width: 8%; }
  #categoryTable th:nth-child(8),
  #categoryTable td:nth-child(8) { width: 6%; }
  #categoryTable th:nth-child(9),
  #categoryTable td:nth-child(9) { width: 7%; }
  #categoryTable th:nth-child(10),
  #categoryTable td:nth-child(10) { width: 7%; }
  #categoryTable th:nth-child(11),
  #categoryTable td:nth-child(11) { width: 8%; }
  #categoryTable th:nth-child(12),
  #categoryTable td:nth-child(12) { width: 5%; }
  #categoryTable th:nth-child(13),
  #categoryTable td:nth-child(13) { width: 7%; }

  #categoryTable td.num {
    word-break: keep-all;
  }

  #productAnalysisTable {
    min-width: 1680px;
  }

  @media (max-width: 900px) {
    .product-summary-grid,
    .product-analysis-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px) {
    .product-summary-grid,
    .product-analysis-grid,
    .product-zone-split {
      grid-template-columns: 1fr;
    }
  }

  .row-cat-subtotal td {
    background: #e8f0f8;
    font-weight: 700;
    border-top: 1px solid #b0c4de;
    border-bottom: 1px solid #b0c4de;
  }

  .row-grand-total td {
    background: #1f5f99;
    color: #ffffff;
    font-weight: 800;
    border-top: 2px solid #173f66;
  }

  .row-grand-total .num-good,
  .row-grand-total .num-warn,
  .row-grand-total .num-bad {
    color: #ffffff;
  }

  /* ── ゾーン売上カード ───────────────────────────── */
  .zs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 12px;
  }

  .zs-card {
    padding: 0;
    overflow: hidden;
  }

  .zs-card-total {
    border: 2px solid #1f5f99;
    background: #f0f6ff;
  }

  .zs-card-head {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: #1f5f99;
    padding: 8px 14px;
  }

  .zs-card-total .zs-card-head {
    background: #0d3d6b;
  }

  .zs-cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .zs-col {
    padding: 10px 12px;
    border-right: 1px solid #dde8f2;
  }

  .zs-col:last-child {
    border-right: none;
    background: #f7fafd;
  }

  .zs-col-head {
    font-size: 11px;
    font-weight: 700;
    color: #62748a;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #dde8f2;
  }
