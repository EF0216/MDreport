<script>
  // 北から南のゾーン順（この順で表示・ドロップダウン）
  const ZONE_ORDER_NS = [
    '北海道', '青森', '東北', '首都圏', '西関東', '東関東',
    '東関西', '西関西', '中部', '北陸', '中国', '四国',
    '北九州', '筑豊', '福岡', '東九州', '西九州', '天草', '南九州',
    '西友'
  ];

  function sortZonesNS(zoneNames) {
    return [...zoneNames].sort((a, b) => {
      const ai = ZONE_ORDER_NS.indexOf(a);
      const bi = ZONE_ORDER_NS.indexOf(b);
      if (ai === -1 && bi === -1) return String(a).localeCompare(String(b), 'ja');
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  }

  function shiftDateString(date, days) {
    const d = new Date(`${date}T00:00:00`);
    d.setDate(d.getDate() + days);
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function pickComparisonDate(dates, date) {
    const lastWeekDate = shiftDateString(date, -7);
    if (dates.includes(lastWeekDate)) {
      return {
        date: lastWeekDate,
        label: '前週同曜日',
        rateLabel: '前週同曜日比',
        diffLabel: '前週同曜日差'
      };
    }
    const fallback = dates[dates.indexOf(date) + 1] || '';
    return {
      date: fallback,
      label: fallback ? '前回' : '比較日なし',
      rateLabel: fallback ? '前回比' : '比較なし',
      diffLabel: fallback ? '前回差' : '比較なし'
    };
  }

  const state = {
    loading: false,
    data: null,
    periods: {
      important: { mode: 'daily', weekKey: '' },
      weather: { mode: 'daily', weekKey: '' },
      sales: { mode: 'daily', weekKey: '' },
      category: { mode: 'daily', weekKey: '' },
      news: { mode: 'daily', weekKey: '' }
    }
  };

  function rowWeekNo(row) {
    const week = row.week_no || row.week || '';
    return week === '' || week === null || typeof week === 'undefined' ? '' : String(week);
  }

  function rowInWeek(row, week) {
    if (!week) return false;
    const date = String(row.date || '');
    if (!date || date < week.startDate || date > week.endDate) return false;
    const weekNo = rowWeekNo(row);
    return !weekNo || weekNo === String(week.weekNo);
  }

  function rowInDateRange(row, startDate, endDate) {
    const date = String(row.date || '');
    return date && date >= startDate && date <= endDate;
  }

  function periodRangeText(startDate, endDate) {
    return startDate === endDate ? startDate : `${startDate}〜${endDate}`;
  }

  function currentPeriodWeek(periodKey, weeks) {
    const period = state.periods[periodKey] || { mode: 'daily', weekKey: '' };
    return weeks.find((week) => week.key === period.weekKey) || weeks[0] || null;
  }

  function bindPeriodControls(periodKey, weeks, onChange) {
    const period = state.periods[periodKey] || (state.periods[periodKey] = { mode: 'daily', weekKey: '' });
    const mode = document.getElementById(`${periodKey}PeriodMode`);
    const tabs = document.getElementById(`${periodKey}WeekTabs`);
    if (!weeks.length) period.mode = 'daily';
    if (!period.weekKey && weeks[0]) period.weekKey = weeks[0].key;
    if (mode) {
      mode.querySelectorAll('.segment').forEach((button) => {
        button.classList.toggle('is-active', button.dataset.mode === period.mode);
        button.onclick = () => {
          period.mode = button.dataset.mode === 'weekly' && weeks.length ? 'weekly' : 'daily';
          if (!period.weekKey && weeks[0]) period.weekKey = weeks[0].key;
          bindPeriodControls(periodKey, weeks, onChange);
          onChange();
        };
      });
    }
    if (tabs) {
      tabs.classList.toggle('is-visible', period.mode === 'weekly' && weeks.length > 0);
      tabs.innerHTML = weeks.map((week) => `
        <button type="button" class="week-tab ${week.key === period.weekKey ? 'is-active' : ''}" data-week="${escapeAttribute(week.key)}">
          ${escapeHtml(week.label)}
        </button>
      `).join('');
      tabs.querySelectorAll('.week-tab').forEach((button) => {
        button.onclick = () => {
          period.weekKey = button.dataset.week || period.weekKey;
          bindPeriodControls(periodKey, weeks, onChange);
          onChange();
        };
      });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    bindEvents();
    loadDashboard();
  });

  function bindEvents() {
    document.getElementById('reloadButton').addEventListener('click', loadDashboard);
    document.getElementById('manualUpdateButton').addEventListener('click', runManualUpdate);
    document.querySelectorAll('.tab').forEach((button) => {
      button.addEventListener('click', () => switchSection(button.dataset.section));
    });
  }

  function switchSection(sectionId) {
    document.querySelectorAll('.tab').forEach((tab) => {
      tab.classList.toggle('active', tab.dataset.section === sectionId);
    });
    document.querySelectorAll('.dashboard-section').forEach((section) => {
      section.classList.toggle('active', section.id === sectionId);
    });
  }

  function loadDashboard() {
    setLoading(true, '読み込み中...');
    google.script.run
      .withSuccessHandler((data) => {
        state.data = data;
        renderDashboard(data);
        setLoading(false);
      })
      .withFailureHandler((error) => {
        showError(error);
        setLoading(false);
      })
      .getDashboardData();
  }

  function runManualUpdate() {
    const button = document.getElementById('manualUpdateButton');
    button.disabled = true;
    button.textContent = '更新中...';
    setLoading(true, '手動更新中...');

    google.script.run
      .withSuccessHandler((data) => {
        state.data = data;
        renderDashboard(data);
        button.disabled = false;
        button.textContent = '手動更新';
        setLoading(false);
      })
      .withFailureHandler((error) => {
        showError(error);
        button.disabled = false;
        button.textContent = '手動更新';
        setLoading(false);
      })
      .updateDailyData();
  }

  function renderDashboard(data) {
    hideError();
    const weeks = data.dashboardWeeks || data.legwearWeeks || [];
    document.getElementById('updatedAt').textContent = data.updatedAt || '-';
    renderTodayAlerts(buildImportantAlerts(data), buildImportantAlerts(data, true), weeks);
    renderSalesAlerts(data.legwearBumon || [], data.legwearCategory || [], data.weatherDaily || data.weatherLatest || [], weeks);
    renderWeather(data.weatherLatest || [], data.weatherTrend || [], data.zoneOrder || [], data.weatherDaily || [], weeks);
    renderSales(data.legwearBumon || [], data.legwearDates || [], weeks);
    renderCategory(data.legwearCategory || [], data.legwearDates || [], weeks);
    renderProductAnalysis(
      data.legwearCategory || [],
      data.legwearCurrentWeekDates || data.legwearDates || [],
      data.weatherTrend || [],
      data.legwearWeeks || [],
      data.legwearDates || []
    );
    renderNews(data.newsLatest || [], data.newsDaily || [], weeks);
    renderReviewNews(data.newsReview || []);
    renderTags(data.analysisTags || []);
  }

  function buildImportantAlerts(data, useRange = false) {
    const baseAlerts = useRange ? (data.productAlertsDaily || data.productAlerts || []) : (data.todayAlerts || []);
    const importantNews = (useRange ? (data.newsDaily || []) : (data.newsLatest || []))
      .filter((row) => Number(row.importance || 0) >= 4)
      .map((row) => ({
        date: row.date,
        category: row.category || 'ニュース',
        keyword: row.keyword || row.title || 'ニュース',
        alert_type: 'ニュース',
        evidence: row.title,
        importance: row.importance,
        sales_check_point: row.md_insight || row.summary || 'ニュース内容を売上分析時の外部要因として確認',
        action: row.source ? `${row.source} / ニュースタブで詳細確認` : 'ニュースタブで詳細確認',
        created_at: row.created_at
      }));

    const seen = {};
    return [...baseAlerts, ...importantNews].filter((item) => {
      const key = `${item.date || ''}|${item.alert_type || ''}|${item.evidence || item.keyword || ''}`;
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }

  function renderTodayAlerts(items, rangeItems = items, weeks = []) {
    const render = () => {
    const period = state.periods.important;
    const week = currentPeriodWeek('important', weeks);
    const sourceItems = period.mode === 'weekly' && week
      ? (rangeItems || []).filter((item) => rowInDateRange(item, week.startDate, week.endDate))
      : items;
    const sorted = sortByImportance(sourceItems);

    // 同一 keyword × alert_type は1枚にまとめる（ゾーン名は evidence に列挙）
    const groupMap = {};
    sorted.forEach(item => {
      const key = `${item.keyword}||${item.alert_type || ''}`;
      if (!groupMap[key]) {
        groupMap[key] = { ...item, _evidences: [] };
      }
      groupMap[key]._evidences.push(item.evidence);
    });
    const consolidated = Object.values(groupMap).map(g => {
      const base = { ...g };
      if (g._evidences.length === 1) {
        base.evidence = g._evidences[0];
      } else {
        // 最大5件表示、残りは「他N件」
        const shown = g._evidences.slice(0, 5);
        const rest  = g._evidences.length - shown.length;
        base.evidence = shown.join(' / ') + (rest > 0 ? ` 他${rest}件` : '');
      }
      return base;
    }).sort((a, b) => Number(b.importance || 0) - Number(a.importance || 0));

    const display = consolidated.slice(0, 12);
    document.getElementById('alertCount').textContent = `${display.length}件`;
    renderCards('todayAlerts', display, (item) => `
      <article class="card important">
        <div class="meta">
          <span>${escapeHtml(period.mode === 'weekly' && week ? `W${week.weekNo} ${periodRangeText(week.startDate, week.endDate)}` : item.date)}</span>
          <span>${escapeHtml(item.category)}</span>
          <span class="importance">重要度 ${escapeHtml(item.importance)}</span>
        </div>
        <div class="card-title">${escapeHtml(item.evidence)}</div>
        <div>${escapeHtml(item.sales_check_point)}</div>
        <div class="action">${escapeHtml(item.action)}</div>
      </article>
    `);
    };
    bindPeriodControls('important', weeks, () => renderDashboard(state.data || {}));
    render();
  }

  // ── 売上動向アラート（前週同曜日比） ───────────────────────────────────
  function computeSalesAlerts(bumonRows, categoryRows, weatherItems) {
    const dates = [...new Set(bumonRows.map(r => r.date).filter(Boolean))].sort().reverse();
    if (dates.length < 2) return [];
    const todayD = dates[0];
    const comparison = pickComparisonDate(dates, todayD);
    const prevD = comparison.date;
    if (!prevD) return [];

    const weatherByZone = {};
    (weatherItems || []).forEach(w => { if (w.zone) weatherByZone[w.zone] = w; });

    const isAggr = r => String(r.zone_code || '').padStart(4,'0') === '0000' || r.zone_name === '全社計';
    const alerts = [];

    // ── ゾーン別売上比較（bumonデータ、個別ゾーン行）
    const sumByZoneDetail = (rows) => {
      const m = {};
      rows.filter(r => !isAggr(r)).forEach(r => {
        const z = r.zone_name; if (!z) return;
        const bcd = String(r['部門CD'] || '').padStart(4, '0');
        const actual = Number(r['売上実績'] || 0);
        const budget = Number(r['売上予算'] || 0);
        const lastYear = Number(r['前年同週同曜日実績'] || 0);
        const profit = grossProfitFromRow(r, '売上実績');
        const lastYearProfit = lastYearGrossProfitFromRow(r);
        if (!m[z]) {
          m[z] = {
            total: 0, mens: 0, ladies: 0,
            totalBudget: 0, mensBudget: 0, ladiesBudget: 0,
            totalLy: 0, mensLy: 0, ladiesLy: 0,
            totalProfit: 0, mensProfit: 0, ladiesProfit: 0,
            totalLyProfit: 0, mensLyProfit: 0, ladiesLyProfit: 0
          };
        }
        m[z].total  += actual;
        m[z].totalBudget += budget;
        m[z].totalLy += lastYear;
        if (!Number.isNaN(profit)) m[z].totalProfit += profit;
        if (!Number.isNaN(lastYearProfit)) m[z].totalLyProfit += lastYearProfit;
        if (bcd === '0075') {
          m[z].mens += actual;
          m[z].mensBudget += budget;
          m[z].mensLy += lastYear;
          if (!Number.isNaN(profit)) m[z].mensProfit += profit;
          if (!Number.isNaN(lastYearProfit)) m[z].mensLyProfit += lastYearProfit;
        }
        if (bcd === '0187') {
          m[z].ladies += actual;
          m[z].ladiesBudget += budget;
          m[z].ladiesLy += lastYear;
          if (!Number.isNaN(profit)) m[z].ladiesProfit += profit;
          if (!Number.isNaN(lastYearProfit)) m[z].ladiesLyProfit += lastYearProfit;
        }
      });
      const national = Object.values(m).reduce((acc, row) => {
        Object.keys(acc).forEach(key => { acc[key] += Number(row[key] || 0); });
        return acc;
      }, {
        total: 0, mens: 0, ladies: 0,
        totalBudget: 0, mensBudget: 0, ladiesBudget: 0,
        totalLy: 0, mensLy: 0, ladiesLy: 0,
        totalProfit: 0, mensProfit: 0, ladiesProfit: 0,
        totalLyProfit: 0, mensLyProfit: 0, ladiesLyProfit: 0
      });
      if (national.total > 0) m['全社計'] = national;
      return m;
    };
    const zTodayD = sumByZoneDetail(bumonRows.filter(r => r.date === todayD));
    const zPrevD  = sumByZoneDetail(bumonRows.filter(r => r.date === prevD));
    const zToday  = Object.fromEntries(Object.entries(zTodayD).map(([z, v]) => [z, v.total]));
    const zPrev   = Object.fromEntries(Object.entries(zPrevD).map(([z, v])  => [z, v.total]));

    const sumCategoryByZoneAndBumon = (rows) => {
      const m = {};
      rows.filter(r => !isAggr(r)).forEach(r => {
        const zone = r.zone_name;
        const bumon = String(r['部門CD'] || '').padStart(4, '0');
        if (!zone || !['0075', '0187'].includes(bumon)) return;
        const bumonName = r['部門名'] || (bumon === '0075' ? 'メンズ' : 'レディース');
        const category = r['カテゴリ名'] || '未設定';
        const subcategory = r['サブカテ名'] || '未設定';
        const key = `${zone}|||${bumon}|||${category}|||${subcategory}`;
        if (!m[key]) {
          m[key] = {
            zone, bumon, bumonName, category, subcategory,
            today: 0, prev: 0, ly: 0, hasLy: false,
            profit: 0, profitLy: 0, hasProfit: false, hasProfitLy: false
          };
        }
        m[key].today += Number(r['実績金額'] || 0);
        const profit = grossProfitFromRow(r, '実績金額');
        const profitLy = lastYearGrossProfitFromRow(r);
        if (!Number.isNaN(profit)) {
          m[key].profit += profit;
          m[key].hasProfit = true;
        }
        if (!Number.isNaN(profitLy)) {
          m[key].profitLy += profitLy;
          m[key].hasProfitLy = true;
        }
        if (r['前年同週同曜日実績'] !== '' && r['前年同週同曜日実績'] !== null && typeof r['前年同週同曜日実績'] !== 'undefined') {
          m[key].ly += Number(r['前年同週同曜日実績'] || 0);
          m[key].hasLy = true;
        }
      });
      return m;
    };
    const catTodayMap = sumCategoryByZoneAndBumon(categoryRows.filter(r => r.date === todayD));
    const catPrevMap = sumCategoryByZoneAndBumon(categoryRows.filter(r => r.date === prevD));
    Object.keys(catPrevMap).forEach(key => {
      if (!catTodayMap[key]) {
        catTodayMap[key] = {
          ...catPrevMap[key],
          today: 0, ly: 0, hasLy: false,
          profit: 0, profitLy: 0, hasProfit: false, hasProfitLy: false
        };
      }
      catTodayMap[key].prev = catPrevMap[key].today || 0;
    });

    const findMainCategory = (zone, bumon, direction) => {
      const rows = Object.values(catTodayMap)
        .filter(r => (zone === '全社計' || r.zone === zone) && r.bumon === bumon)
        .map(r => {
          const diff = Number(r.today || 0) - Number(r.prev || 0);
          const pct = r.prev ? diff / r.prev * 100 : null;
          const grossRate = r.hasProfit ? grossMarginRate(r.profit, r.today) : NaN;
          const profitYoy = r.hasProfitLy && r.profitLy ? r.profit / r.profitLy * 100 : null;
          const impactAmount = Math.abs(diff);
          return { ...r, diff, pct, grossRate, profitYoy, impactAmount };
        })
        .filter(r => Math.abs(r.diff) > 0);
      if (!rows.length) return null;

      const directional = rows.filter(r => direction === 'up' ? r.diff > 0 : r.diff < 0);
      const candidates = directional.length ? directional : rows;
      candidates.sort((a, b) => b.impactAmount - a.impactAmount);
      return candidates[0];
    };

    const findSubcatZoneMoves = (bumon, category, subcategory, direction, limit) => {
      const grouped = {};
      Object.values(catTodayMap)
        .filter(r => r.bumon === bumon && r.category === category && r.subcategory === subcategory)
        .forEach(r => {
          const key = r.zone;
          if (!grouped[key]) {
            grouped[key] = {
              zone: r.zone,
              today: 0,
              prev: 0,
              ly: 0,
              hasLy: false,
              profit: 0,
              profitLy: 0,
              hasProfit: false,
              hasProfitLy: false
            };
          }
          grouped[key].today += Number(r.today || 0);
          grouped[key].prev += Number(r.prev || 0);
          if (r.hasProfit) {
            grouped[key].profit += Number(r.profit || 0);
            grouped[key].hasProfit = true;
          }
          if (r.hasProfitLy) {
            grouped[key].profitLy += Number(r.profitLy || 0);
            grouped[key].hasProfitLy = true;
          }
          if (r.hasLy) {
            grouped[key].ly += Number(r.ly || 0);
            grouped[key].hasLy = true;
          }
        });

      return Object.values(grouped)
        .map(r => {
          const diff = Number(r.today || 0) - Number(r.prev || 0);
          const pct = r.prev ? diff / r.prev * 100 : null;
          const yoy = r.hasLy && r.ly ? r.today / r.ly * 100 : null;
          const grossRate = r.hasProfit ? grossMarginRate(r.profit, r.today) : NaN;
          const profitYoy = r.hasProfitLy && r.profitLy ? r.profit / r.profitLy * 100 : null;
          return { ...r, diff, pct, yoy, grossRate, profitYoy, impactAmount: Math.abs(diff) };
        })
        .filter(r => direction === 'up' ? r.diff > 0 : r.diff < 0)
        .sort((a, b) => b.impactAmount - a.impactAmount)
        .slice(0, limit);
    };

    const buildSubcatChanges = () => {
      const grouped = {};
      Object.values(catTodayMap).forEach(r => {
        const key = `${r.bumon}|||${r.bumonName}|||${r.category}|||${r.subcategory}`;
        if (!grouped[key]) {
          grouped[key] = {
            bumon: r.bumon,
            bumonName: r.bumonName,
            category: r.category,
            subcategory: r.subcategory,
            todayAmt: 0,
            prevAmt: 0,
            profitAmt: 0,
            profitLyAmt: 0,
            hasProfit: false,
            hasProfitLy: false
          };
        }
        grouped[key].todayAmt += Number(r.today || 0);
        grouped[key].prevAmt += Number(r.prev || 0);
        if (r.hasProfit) {
          grouped[key].profitAmt += Number(r.profit || 0);
          grouped[key].hasProfit = true;
        }
        if (r.hasProfitLy) {
          grouped[key].profitLyAmt += Number(r.profitLy || 0);
          grouped[key].hasProfitLy = true;
        }
      });

      return Object.values(grouped)
        .filter(r => r.prevAmt >= 1000 && r.todayAmt >= 100)
        .map(r => {
          const diff = Number(r.todayAmt || 0) - Number(r.prevAmt || 0);
          const pct = r.prevAmt ? diff / r.prevAmt * 100 : null;
          const grossRate = r.hasProfit ? grossMarginRate(r.profitAmt, r.todayAmt) : NaN;
          const profitYoy = r.hasProfitLy && r.profitLyAmt ? r.profitAmt / r.profitLyAmt * 100 : null;
          return {
            ...r,
            diff,
            pct,
            grossRate,
            profitYoy,
            impactAmount: Math.abs(diff),
            goodZones: findSubcatZoneMoves(r.bumon, r.category, r.subcategory, 'up', 3),
            badZones: findSubcatZoneMoves(r.bumon, r.category, r.subcategory, 'down', 3)
          };
        })
        .filter(r => Math.abs(r.diff) > 0);
    };

    const pctVs = (today, base) => base ? (today - base) / base * 100 : null;
    const yoyRate = (today, lastYear) => lastYear ? today / lastYear * 100 : null;
    const budgetRate = (today, budget) => budget ? today / budget * 100 : null;
    const judgeTwoAxis = (dayPct, yoy) => {
      if (yoy === null || Number.isNaN(yoy)) {
        return { label: dayPct >= 0 ? `${comparison.rateLabel}回復` : `${comparison.rateLabel}下落`, className: dayPct >= 0 ? 'num-good' : 'num-bad' };
      }
      if (dayPct >= 0 && yoy >= 100) return { label: '好調継続', className: 'num-good' };
      if (dayPct >= 0 && yoy < 100) return { label: `${comparison.rateLabel}回復・前年差不足`, className: 'num-warn' };
      if (dayPct < 0 && yoy >= 100) return { label: `${comparison.rateLabel}反動・前年差は維持`, className: 'num-warn' };
      return { label: '注意', className: 'num-bad' };
    };

    const allZoneChanges = Object.keys(zToday)
      .filter(z => (zPrev[z] || 0) >= 10000 && (zToday[z] || 0) > 0)
      .map(z => {
        const pct = (zToday[z] - zPrev[z]) / zPrev[z] * 100;
        const yoy = yoyRate(zTodayD[z]?.total || 0, zTodayD[z]?.totalLy || 0);
        const w = weatherByZone[z] || {};
        const hasLastWeekTemp = w.temp_vs_last_week !== '' && w.temp_vs_last_week !== null && typeof w.temp_vs_last_week !== 'undefined';
        const tempDiff = Number(hasLastWeekTemp ? w.temp_vs_last_week : (w.temp_vs_yesterday || 0));
        const tempCompareLabel = hasLastWeekTemp ? '前週差' : '前日差';
        const direction = pct >= 0 ? 'up' : 'down';
        const judgment = judgeTwoAxis(pct, yoy);
        return { zone: z, today: zToday[z], prev: zPrev[z], pct, tempDiff, tempCompareLabel,
          todayMens: zTodayD[z]?.mens || 0, prevMens: zPrevD[z]?.mens || 0,
          budgetMens: zTodayD[z]?.mensBudget || 0,
          lyMens: zTodayD[z]?.mensLy || 0,
          profitMens: zTodayD[z]?.mensProfit || 0,
          lyProfitMens: zTodayD[z]?.mensLyProfit || 0,
          todayLadies: zTodayD[z]?.ladies || 0, prevLadies: zPrevD[z]?.ladies || 0,
          budgetLadies: zTodayD[z]?.ladiesBudget || 0,
          lyLadies: zTodayD[z]?.ladiesLy || 0,
          profitLadies: zTodayD[z]?.ladiesProfit || 0,
          lyProfitLadies: zTodayD[z]?.ladiesLyProfit || 0,
          budgetTotal: zTodayD[z]?.totalBudget || 0,
          lyTotal: zTodayD[z]?.totalLy || 0,
          profitTotal: zTodayD[z]?.totalProfit || 0,
          lyProfitTotal: zTodayD[z]?.totalLyProfit || 0,
          yoy, budgetRatio: budgetRate(zTodayD[z]?.total || 0, zTodayD[z]?.totalBudget || 0), judgment,
          grossRateTotal: grossMarginRate(zTodayD[z]?.totalProfit || 0, zTodayD[z]?.total || 0),
          profitYoy: yoyRate(zTodayD[z]?.totalProfit || 0, zTodayD[z]?.totalLyProfit || 0),
          grossRateMens: grossMarginRate(zTodayD[z]?.mensProfit || 0, zTodayD[z]?.mens || 0),
          profitYoyMens: yoyRate(zTodayD[z]?.mensProfit || 0, zTodayD[z]?.mensLyProfit || 0),
          grossRateLadies: grossMarginRate(zTodayD[z]?.ladiesProfit || 0, zTodayD[z]?.ladies || 0),
          profitYoyLadies: yoyRate(zTodayD[z]?.ladiesProfit || 0, zTodayD[z]?.ladiesLyProfit || 0),
          mensBudgetRatio: budgetRate(zTodayD[z]?.mens || 0, zTodayD[z]?.mensBudget || 0),
          ladiesBudgetRatio: budgetRate(zTodayD[z]?.ladies || 0, zTodayD[z]?.ladiesBudget || 0),
          mensYoy: yoyRate(zTodayD[z]?.mens || 0, zTodayD[z]?.mensLy || 0),
          ladiesYoy: yoyRate(zTodayD[z]?.ladies || 0, zTodayD[z]?.ladiesLy || 0),
          mainMens: findMainCategory(z, '0075', direction),
          mainLadies: findMainCategory(z, '0187', direction) };
      })
      .sort((a, b) => b.pct - a.pct);

    const nationalChange = allZoneChanges.find(z => z.zone === '全社計');
    const zoneOnlyChanges = allZoneChanges.filter(z => z.zone !== '全社計' && Math.abs(z.pct) >= 10);
    const zoneUpDown = [
      ...(nationalChange ? [nationalChange] : []),
      ...zoneOnlyChanges.filter(z => z.pct > 0).slice(0, 3),
      ...zoneOnlyChanges.filter(z => z.pct < 0).slice(-3).reverse()
    ];
    zoneUpDown.forEach(z => {
      const isUp = z.pct > 0;
      let tempNote = '';
      if (Math.abs(z.tempDiff) >= 2) {
        const tempLabel = `平均気温${z.tempCompareLabel}`;
        if (isUp  && z.tempDiff >= 2)  tempNote = `${tempLabel}+${z.tempDiff.toFixed(1)}℃ → 気温寄与の可能性`;
        if (isUp  && z.tempDiff <= -2) tempNote = `${tempLabel}${z.tempDiff.toFixed(1)}℃ → 気温以外の要因で伸長`;
        if (!isUp && z.tempDiff <= -2) tempNote = `${tempLabel}${z.tempDiff.toFixed(1)}℃ → 気温寄与の可能性`;
        if (!isUp && z.tempDiff >= 2)  tempNote = `${tempLabel}+${z.tempDiff.toFixed(1)}℃にもかかわらず下落`;
      }
      alerts.push({ type: isUp ? 'zone_up' : 'zone_down',
        zone: z.zone, pct: z.pct, today: z.today, prev: z.prev, tempNote, todayD, prevD,
        compareLabel: comparison.label, compareRateLabel: comparison.rateLabel, compareDiffLabel: comparison.diffLabel,
        todayMens: z.todayMens, prevMens: z.prevMens,
        budgetMens: z.budgetMens, lyMens: z.lyMens, mensYoy: z.mensYoy, mensBudgetRatio: z.mensBudgetRatio,
        profitMens: z.profitMens, lyProfitMens: z.lyProfitMens, grossRateMens: z.grossRateMens, profitYoyMens: z.profitYoyMens,
        todayLadies: z.todayLadies, prevLadies: z.prevLadies,
        budgetLadies: z.budgetLadies, lyLadies: z.lyLadies, ladiesYoy: z.ladiesYoy, ladiesBudgetRatio: z.ladiesBudgetRatio,
        profitLadies: z.profitLadies, lyProfitLadies: z.lyProfitLadies, grossRateLadies: z.grossRateLadies, profitYoyLadies: z.profitYoyLadies,
        budgetTotal: z.budgetTotal, lyTotal: z.lyTotal, yoy: z.yoy, budgetRatio: z.budgetRatio, judgment: z.judgment,
        profitTotal: z.profitTotal, lyProfitTotal: z.lyProfitTotal, grossRateTotal: z.grossRateTotal, profitYoy: z.profitYoy,
        mainMens: z.mainMens, mainLadies: z.mainLadies });
    });

    const subcatChanges = buildSubcatChanges();
    const subcatUpDown = [
      ...subcatChanges.filter(s => s.diff > 0).sort((a, b) => b.impactAmount - a.impactAmount).slice(0, 3),
      ...subcatChanges.filter(s => s.diff < 0).sort((a, b) => b.impactAmount - a.impactAmount).slice(0, 3)
    ];
    subcatUpDown.forEach(s => {
      const isUp = s.diff > 0;
      alerts.push({
        type: isUp ? 'subcat_up' : 'subcat_down',
        部門名: s.bumonName,
        カテゴリ名: s.category,
        サブカテ名: s.subcategory,
        pct: s.pct,
        diff: s.diff,
        todayAmt: s.todayAmt,
        prevAmt: s.prevAmt,
        profitAmt: s.profitAmt,
        profitLyAmt: s.profitLyAmt,
        grossRate: s.grossRate,
        profitYoy: s.profitYoy,
        goodZones: s.goodZones,
        badZones: s.badZones,
        todayD,
        prevD,
        compareLabel: comparison.label,
        compareRateLabel: comparison.rateLabel,
        compareDiffLabel: comparison.diffLabel
      });
    });

    return alerts;
  }

  function renderSalesAlerts(bumonRows, categoryRows, weatherItems, weeks = []) {

    const alerts = computeSalesAlerts(alertBumonRows, alertCategoryRows, alertWeatherItems);
    if (!alerts.length) { section.hidden = true; return; }

    section.hidden = false;
    countBadge.textContent = `${alerts.length}件`;

    const fmtYen  = v => v === null || typeof v === 'undefined' || Number.isNaN(Number(v)) ? '-' : Math.round(Number(v)).toLocaleString('ja-JP') + '円';

    const grossLine = (profit, margin, profitYoy) => `

        <span class="sales-main-amount">荒利 ${escapeHtml(fmtYen(item.profit))}</span>
        <span class="${rateCls(item.profitYoy)}">荒利前年比 ${escapeHtml(fmtRate(item.profitYoy))}</span>
      `;
    };
    const fmtSubcatRow = item => {
      const pct = item.pct === null || item.pct === undefined ? '-' : `${item.pct > 0 ? '+' : ''}${item.pct.toFixed(1)}%`;
      const yoy = item.yoy === null || item.yoy === undefined || Number.isNaN(Number(item.yoy)) ? '-' : `${Number(item.yoy).toFixed(1)}%`;
      const cls = item.diff >= 0 ? 'num-good' : 'num-bad';

    };

    container.innerHTML = alerts.map(a => {
      const isUp    = a.type === 'zone_up' || a.type === 'subcat_up';

      const yoyStr = isZone ? fmtRate(a.yoy) : '-';
      const budgetStr = isZone ? fmtRate(a.budgetRatio) : '-';
      const prevAmt = isZone ? a.prev    : a.prevAmt;
      const todAmt  = isZone ? a.today   : a.todayAmt;

      const compareRateLabel = a.compareRateLabel || '比較比';
      const title   = isZone
        ? `${escapeHtml(a.zone)}：<span class="${cls}">${escapeHtml(compareRateLabel)} ${pctStr}</span> <span class="${rateCls(a.yoy)}">前年比 ${yoyStr}</span> <span class="${rateCls(a.budgetRatio)}">予算比 ${budgetStr}</span>`
        : `${escapeHtml(a.サブカテ名)}：<span class="${cls}">${escapeHtml(compareRateLabel)} ${pctStr}</span> <span class="${cls}">金額影響 ${escapeHtml(fmtDiff(a.diff))}</span>`;
      const label   = isZone
        ? `${escapeHtml(a.zone)}　ゾーン売上`

        <div class="sales-judgment ${escapeAttribute(a.judgment.className || '')}">

      const subcatZoneBlock = !isZone ? `
        <div class="sales-zone-subcats">
          <div class="sales-zone-subcat-group">
            <div class="sales-zone-subcat-title num-good">良いゾーン 上位3</div>
            ${fmtSubcatList(a.goodZones)}

            <div class="sales-zone-subcat-title num-bad">悪いゾーン 上位3</div>
            ${fmtSubcatList(a.badZones)}
          </div>
        </div>` : '';

      // ゾーンカードのみ：メンズ・レディース内訳
      const bumonBreakdown = isZone ? `
        <div class="sales-alert-breakdown">
          <div class="sales-alert-bumon">
            <div class="sales-alert-bumon-head">
              <span>メンズ</span>
              <span>
                <span class="${pctCls(a.todayMens, a.prevMens)}">${escapeHtml(compareLabel)} ${fmtPct(a.todayMens, a.prevMens)}</span>
                <span class="${rateCls(a.mensYoy)}">前年 ${fmtRate(a.mensYoy)}</span>
                <span class="${rateCls(a.mensBudgetRatio)}">予算 ${fmtRate(a.mensBudgetRatio)}</span>
                <span class="sales-alert-amount">${fmtYen(a.prevMens)} → ${fmtYen(a.todayMens)}</span>
              </span>
            </div>
            <div class="sales-alert-main">${fmtMain(a.mainMens)}</div>
            ${grossLine(a.profitMens, a.grossRateMens, a.profitYoyMens)}
          </div>
          <div class="sales-alert-bumon">
            <div class="sales-alert-bumon-head">
              <span>レディース</span>
              <span>
                <span class="${pctCls(a.todayLadies, a.prevLadies)}">${escapeHtml(compareLabel)} ${fmtPct(a.todayLadies, a.prevLadies)}</span>
                <span class="${rateCls(a.ladiesYoy)}">前年 ${fmtRate(a.ladiesYoy)}</span>
                <span class="${rateCls(a.ladiesBudgetRatio)}">予算 ${fmtRate(a.ladiesBudgetRatio)}</span>
                <span class="sales-alert-amount">${fmtYen(a.prevLadies)} → ${fmtYen(a.todayLadies)}</span>
              </span>
            </div>
            <div class="sales-alert-main">${fmtMain(a.mainLadies)}</div>
            ${grossLine(a.profitLadies, a.grossRateLadies, a.profitYoyLadies)}
          </div>
        </div>` : '';

      return `<article class="card">
        <div class="meta">
          <span>${escapeHtml(a.todayD)}</span>
          <span>${escapeHtml(isZone ? 'ゾーン' : 'サブカテゴリ')}</span>
          <span class="${cls}" style="font-weight:800">${arrow} ${label}</span>
        </div>
        <div class="card-title">${title}</div>
        <div style="font-size:13px;color:var(--muted)">
